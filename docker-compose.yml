name: dmc-crm

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8080
      API_PREFIX: api
      # Set to your public domain in EZpanel env vars
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8080}
      MONGODB_URI: ${MONGODB_URI}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-dmc_crm}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_TLS: 'false'
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-qwen/qwen3.6-27b}
      GROQ_REASONING_EFFORT: ${GROQ_REASONING_EFFORT:-none}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - '${APP_PORT:-8080}:8080'

volumes:
  redisdata:
